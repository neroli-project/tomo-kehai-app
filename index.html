<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kehaiアプリ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   <div id="app-container">
        
        <h1>Kehai.</h1>

        <div class="tab-container" style="display: flex; justify-content: space-around; background: rgba(255,255,255,0.8); padding: 10px 0; border-bottom: 1px solid #ddd; margin-bottom: 15px; border-radius: 8px 8px 0 0;">
            <button id="tab-my" onclick="switchTab('my')" style="flex: 1; background: none; border: none; font-size: 1rem; font-weight: bold; color: #4caf50; cursor: pointer; padding: 10px 0; border-bottom: 3px solid #4caf50; transition: all 0.3s;">じぶん 👤</button>
            <button id="tab-partner" onclick="switchTab('partner')" style="flex: 1; background: none; border: none; font-size: 1rem; font-weight: bold; color: #888; cursor: pointer; padding: 10px 0; border-bottom: 3px solid transparent; transition: all 0.3s;">あいて 👥</button>
        </div>

        <section id="partner-area" style="display: none;">
            <h2>〇〇のいま</h2>
            <div style="text-align: center; margin: 15px 0;">
                <img id="partner-avatar" src="image/woman1.png" alt="相手のキャラ" onclick="zoomPhoto(this)" style="width: 120px; height: 120px; border-radius: 50%; border: 4px solid #ccc; cursor: zoom-in; object-fit: cover; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
            </div>
            <p id="partner-message" style="font-size: 1.1rem; font-weight: bold; color: #333; text-align: center; margin-top: 10px;">いまなにしてるかな？</p>
            <div id="effect-layer"></div>
        </section>

        <section id="my-area" style="display: block;">
            
            <h2>じぶんのアバター（タップして変更）</h2>
            <div style="text-align: center; margin: 15px 0;">
                <img id="my-avatar-preview" src="image/woman1.png" alt="自分自身のアバター" onclick="openAvatarModal()" style="width: 120px; height: 120px; border-radius: 50%; border: 4px solid #4caf50; cursor: pointer; object-fit: cover; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
                <p style="font-size: 0.8rem; color: #888; margin-top: 5px;">本日あと <span id="upload-count">3</span> 回変更できます</p>

                <p style="font-size: 0.9rem; color: #4caf50; font-weight: bold; margin-top: 8px;">いまのあなた：<span id="my-current-status">未設定</span></p>
            </div>
            
            <h2>いまの気配を伝える（エフェクト付き！）</h2>
            <div class="status-buttons" style="display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap;">
                <button onclick="changeStatus('🏠 今家でまったり中')">🏠 まったり</button>
                <button onclick="changeStatus('🔥 勉強頑張ってる！')">🔥 勉強がんばる</button>
                <button onclick="changeStatus('💻 パソコンにかじりつき')">💻 パソコン</button>
                <button onclick="changeStatus('🍰 おやつタイム☕️')">🍰 おやつ</button>
                <button onclick="changeStatus('🌙 これから寝るね、おやすみ')">🌙 寝るね</button>
                <button onclick="changeStatus('❤️ また明日')">❤️ また明日</button>
                <button onclick="changeStatus('✨ 夜更かし草')">✨ 夜更かし草</button>
            </div>

            <div class="message-input">
                <input type="text" id="my-message-text" placeholder="自由に入力して送信もできるよ">
                <button onclick="sendStatus()">送信</button>
            </div>

            <div class="photo-upload" style="margin-bottom: 15px;">
                <input type="file" id="bg-photo-input" accept="image/*" style="display: none;" onchange="uploadBackground()">
                <button onclick="document.getElementById('bg-photo-input').click()" style="background-color: #81c784; box-shadow: 0 3px 0 #66bb6a; width: 100%;">背景画像を変更する</button>
            </div>
        </section>

    </div>

    <div id="avatar-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;">
        <div style="background-color: white; padding: 20px; border-radius: 16px; width: 90%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);">
            <h3 style="margin-bottom: 15px; text-align: center; color: #333;">アバターを変更</h3>
            <div style="text-align: center; margin-bottom: 20px;">
                <input type="file" id="avatar-file-input" accept="image/*" style="display: none;" onchange="uploadMyAvatarPhoto()">
                <button onclick="document.getElementById('avatar-file-input').click()" style="background-color: #2196f3; box-shadow: 0 3px 0 #0b7dda; width: 100%;">📸 自分の写真をアップロード</button>
            </div>
            <p style="font-size: 0.9rem; color: #666; margin-bottom: 10px;">または用意されたキャラから選ぶ：</p>
            <div class="avatar-selection-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px;">
                <img src="image/woman1.png" onclick="selectPresetAvatar('woman1')" style="width: 100%; cursor: pointer; border-radius: 8px; border: 2px solid #eee;">
                <img src="image/woman2.png" onclick="selectPresetAvatar('woman2')" style="width: 100%; cursor: pointer; border-radius: 8px; border: 2px solid #eee;">
                <img src="image/woman3.png" onclick="selectPresetAvatar('woman3')" style="width: 100%; cursor: pointer; border-radius: 8px; border: 2px solid #eee;">
                <img src="image/man1.png" onclick="selectPresetAvatar('man1')" style="width: 100%; cursor: pointer; border-radius: 8px; border: 2px solid #eee;">
                <img src="image/man2.png" onclick="selectPresetAvatar('man2')" style="width: 100%; cursor: pointer; border-radius: 8px; border: 2px solid #eee;">
                <img src="image/man3.png" onclick="selectPresetAvatar('man3')" style="width: 100%; cursor: pointer; border-radius: 8px; border: 2px solid #eee;">
            </div>
            <button onclick="closeAvatarModal()" style="background-color: #9e9e9e; box-shadow: 0 3px 0 #757575; width: 100%;">閉じる</button>
        </div>
    </div>

    <div id="photo-zoom-modal" onclick="closeZoomModal()" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; cursor: zoom-out;">
        <img id="zoomed-photo" src="" alt="拡大写真" style="max-width: 90%; max-height: 90%; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); object-fit: contain;">
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
